<style>
        /* тФАтФАтФА Root tokens тАФ exact match to home page тФАтФАтФА */
        :root {
            --lav-bg: #F8F7FF;
            --lav-card: #FFFFFF;
            --lav-border: #EDE9FE;
            --lav-accent: #7C6FE0;
            --lav-accent2: #B8B0F5;
            --lav-light: #F0EFFE;
            --lav-dark: #1A1035;
            --lav-gray: #6B7280;
            --lav-shadow: 0 2px 12px rgba(124,111,224,0.08);
            --lav-radius: 16px;
            --lav-radius-sm: 10px;

            /* subject borders тАФ from app.js lines 1529-1543 */
            --border-math: #3B82F6;
            --border-english: #7C6FE0;
            --border-vocab: #10B981;

            /* subject badge bg тАФ from app.js */
            --badge-math-bg: #DBEAFE;
            --badge-english-bg: #FAE8FF;
            --badge-vocab-bg: #FEF3C7;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Outfit', 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
            background: var(--lav-bg);
            color: var(--lav-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* тФАтФАтФА Sidebar тАФ identical to home page тФАтФАтФА */
        #sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 240px;
            background: #4A4580;
            display: flex; flex-direction: column;
            z-index: 200;
            overflow-y: auto;
            box-shadow: 4px 0 24px rgba(61,56,117,0.18);
        }

        /* тФАтФАтФА Main layout shell тФАтФАтФА */
        .sp-shell {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--lav-bg);
        }
        @media (max-width: 768px) {
            #sidebar { display: none; }
            .sp-shell { margin-left: 0; }
        }

        /* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
           SECTION 1: HEADER BAR
        тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
        .sp-header {
            background: var(--lav-bg);
            border-bottom: 1px solid var(--lav-border);
            padding: 18px 28px 20px;
        }

        /* Page title row (standalone, above cards) */
        .sp-header-title-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 14px;
        }
        .sp-header-title-row h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--lav-dark);
            letter-spacing: -0.03em;
            line-height: 1;
            margin: 0;
        }
        .sp-week-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--lav-gray);
            background: var(--lav-light);
            padding: 3px 10px;
            border-radius: 99px;
        }

        /* 5-card row -> 4-card row now */
        .sp-cards-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 16px;
        }

        /* Base stat card */
        .sp-stat-card {
            background: var(--lav-card);
            border: 1px solid var(--lav-border);
            border-radius: 12px;
            box-shadow: var(--lav-shadow);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            min-height: 110px;
            min-width: 0;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .sp-stat-card:hover {
            box-shadow: 0 6px 20px rgba(124,111,224,0.13);
            transform: translateY(-1px);
        }

        .spc-label-top {
            font-size: 11px;
            font-weight: 700;
            color: var(--lav-gray);
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }

        .spc-val {
            font-size: 26px;
            font-weight: 900;
            color: var(--lav-dark);
            line-height: 1;
            letter-spacing: -0.03em;
        }
        .spc-val.accent { color: var(--lav-accent); }
        .spc-val.urgent { color: #EF4444; }

        .spc-sub {
            font-size: 11px;
            font-weight: 600;
            color: var(--lav-gray);
            line-height: 1.4;
            margin-top: 2px;
        }
        .spc-sub.on-track {
            color: #059669;
            background: #D1FAE5;
            padding: 2px 8px;
            border-radius: 99px;
            display: inline-block;
            margin-top: 4px;
            font-size: 10px;
        }

        /* ROW 2: Progress Journey Strip */
        .sp-journey-card {
            background: var(--lav-card);
            border: 1px solid var(--lav-border);
            border-radius: 12px;
            box-shadow: var(--lav-shadow);
            padding: 16px 20px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .journey-scroll {
            width: 100%;
            overflow-x: auto;
            position: relative;
            padding-bottom: 12px;
        }
        .journey-scroll::-webkit-scrollbar { height: 6px; }
        .journey-scroll::-webkit-scrollbar-thumb { background: var(--lav-border); border-radius: 3px; }

        .journey-track {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            padding: 20px 0;
            min-width: 1200px;
        }
        /* The connecting line behind dots */
        .journey-track::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 16px;
            right: 16px;
            height: 2px;
            background: var(--lav-border);
            transform: translateY(-50%);
            z-index: 1;
        }

        .jdot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 2;
        }

        .jdot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            background: var(--lav-card);
            border: 2px solid var(--lav-border);
            color: var(--lav-gray);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .jdot.done {
            background: var(--lav-accent);
            border-color: var(--lav-accent);
            color: #fff;
        }
        
        .jdot.current {
            background: #fff;
            border-color: var(--lav-accent);
            border-width: 3px;
            color: var(--lav-dark);
            font-size: 15px;
            font-weight: 800;
            width: 40px;
            height: 40px;
            box-shadow: 0 4px 12px rgba(124,111,224,0.25);
        }

        .jdot-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--lav-accent);
            position: absolute;
            top: 100%;
            margin-top: 4px;
            white-space: nowrap;
            display: none;
        }
        .jdot.current + .jdot-label {
            display: block;
        }

        .journey-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .journey-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--lav-dark);
            letter-spacing: 0.05em;
        }
        .journey-link {
            font-size: 11px;
            font-weight: 700;
            color: var(--lav-accent);
            text-decoration: none;
        }
        .journey-link:hover { text-decoration: underline; }

        /* CTA button lives in the header row */
        .sp-cta-btn {
            flex-shrink: 0;
            background: var(--lav-accent);
            color: #fff;
            border: none;
            padding: 0 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,111,224,0.25);
            transition: all 0.2s ease;
            white-space: nowrap;
            align-self: center;
            height: 44px;
        }
        .sp-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124,111,224,0.35);
            background: #6a5ed4;
        }
        .sp-cta-btn:active { transform: translateY(0); }

        .sp-btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--lav-dark);
            border: 1.5px solid var(--lav-border);
            padding: 0 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            height: 44px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .sp-btn-secondary:hover {
            border-color: var(--lav-accent);
            color: var(--lav-accent);
            background: var(--lav-light);
        }
        .sp-btn-secondary i { font-size: 16px; margin-top: -1px; }

        .sp-stat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            border-right: 1px solid var(--lav-border);
            flex-shrink: 0;
        }
        .sp-stat:first-child { padding-left: 0; }
        .sp-stat:last-of-type { border-right: none; }

        .sp-stat-icon {
            width: 34px; height: 34px;
            background: var(--lav-light);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .sp-stat-text-block { display: flex; flex-direction: column; gap: 1px; }
        .sp-stat-val {
            font-size: 15px;
            font-weight: 800;
            color: var(--lav-dark);
            line-height: 1.1;
            white-space: nowrap;
        }
        .sp-stat-val.urgent { color: #EF4444; }
        .sp-stat-val.purple { color: var(--lav-accent); }
        .sp-stat-val.green  { color: #10B981; }
        .sp-stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--lav-gray);
            white-space: nowrap;
        }

        /* Score gap mini-bar */
        .score-gap-bar-wrap {
            width: 80px;
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .score-gap-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--lav-accent), var(--lav-accent2));
            border-radius: 2px;
        }

        /* Weekly 7-dot row */
        .week-dots {
            display: flex; gap: 4px; margin-top: 5px;
        }
        .week-dot {
            width: 11px; height: 11px;
            border-radius: 3px;
            background: #E5E7EB;
            border: 1.5px solid #D1D5DB;
        }
        .week-dot.done { background: #D1FAE5; border-color: #6EE7B7; }
        .week-dot.today { background: rgba(124,111,224,0.2); border-color: var(--lav-accent); }

        /* CTA button */
        .sp-cta-btn {
            margin-left: auto;
            flex-shrink: 0;
            background: var(--lav-accent);
            color: #fff;
            border: none;
            padding: 11px 24px;
            border-radius: var(--lav-radius-sm);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,111,224,0.25);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .sp-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124,111,224,0.35);
            background: #6a5ed4;
        }
        .sp-cta-btn:active { transform: translateY(0); }

        /* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
           SECTION 2: SPLIT BODY
        тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
        .sp-body {
            display: flex;
            gap: 24px;
            padding: 24px 28px;
            align-items: stretch;
        }

        /* тФАтФА LEFT: Task List (42%) тФАтФА */
        .sp-tasks-col {
            width: 42%;
            background: var(--lav-card);
            border: 1px solid var(--lav-border);
            border-radius: var(--lav-radius);
            box-shadow: var(--lav-shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .sp-tasks-col::-webkit-scrollbar { width: 5px; }
        .sp-tasks-col::-webkit-scrollbar-thumb { background: var(--lav-border); border-radius: 3px; }

        .sp-tasks-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .sp-tasks-header h2 {
            font-size: 14px;
            font-weight: 700;
            color: var(--lav-dark);
            margin: 0;
            display: flex; align-items: center; gap: 8px;
        }
        #agenda-progress-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--lav-gray);
            background: var(--lav-light);
            padding: 3px 10px;
            border-radius: 99px;
        }
        .progress-track-wrap {
            margin-bottom: 18px;
        }
        #agenda-progress-track {
            width: 100%;
            height: 4px;
            background: var(--lav-light);
            border-radius: 2px;
            overflow: hidden;
        }
        #agenda-progress-fill {
            height: 100%;
            background: var(--lav-accent);
            border-radius: 2px;
            width: 40%;
            transition: width 0.4s ease;
        }

        /* Task cards тАФ IDENTICAL to home page da-task-card */
        .dac-tasks { display: flex; flex-direction: column; gap: 0; }

        .da-task-card {
            padding: 10px 16px;
            background: #ffffff;
            border: 1px solid var(--lav-border);
            border-radius: 0 20px 20px 0;
            border-left-width: 4px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .da-task-card:hover {
            background: #F0EFFE;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124,111,224,0.10);
        }
        .da-task-card.completed { background: #F8F7FF; }
        .da-task-card.completed h4 {
            text-decoration: line-through;
            color: var(--lav-gray);
        }

        .da-subject-badge {
            font-size: 10px;
            font-weight: 700;
            color: #1E293B;
            padding: 2px 8px;
            border-radius: 6px;
            flex-shrink: 0;
            margin-top: 2px;
            text-transform: uppercase;
        }
        .da-task-card h4 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--lav-dark);
            flex: 1;
            line-height: 1.4;
        }
        .da-pill {
            font-size: 12px;
            color: var(--lav-gray);
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .da-task-checkbox {
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 1.5px solid #D0CBF5;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            background: #fff;
            flex-shrink: 0;
            transition: all 0.2s ease;
            margin-top: 2px;
        }
        .da-task-checkbox.checked {
            background: var(--lav-accent);
            border-color: var(--lav-accent);
        }

        /* тФАтФА RIGHT: Weekly Table (65%) тФАтФА */
        .sp-table-col {
            min-width: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .sp-table-card {
            background: var(--lav-card);
            border: 1px solid var(--lav-border);
            border-radius: var(--lav-radius);
            box-shadow: var(--lav-shadow);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .sp-table-header {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            border-bottom: 1px solid var(--lav-border);
            flex-shrink: 0;
        }
        .sp-table-header h2 {
            font-size: 15px;
            font-weight: 800;
            color: var(--lav-dark);
            margin: 0;
        }

        /* Legend Bar */
        .wt-legend {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--lav-gray);
        }
        .wt-legend-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .wt-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .wt-box { width: 10px; height: 10px; border-radius: 2px; }
        .wt-box.math { background: #DBEAFE; border: 1px solid #93C5FD; }
        .wt-box.reading { background: #D1FAE5; border: 1px solid #6EE7B7; }
        .wt-box.vocab { background: #FEF3C7; border: 1px solid #FCD34D; }
        .wt-box.exam { background: #FFEDD5; border: 1px solid #FDBA74; }
        .wt-icon { font-size: 10px; font-weight: bold; }
        .wt-icon.done { color: #059669; }
        .wt-icon.missed { color: #EF4444; }
        .wt-icon.prog { color: var(--lav-accent); }
        .wt-legend-divider { width: 1px; height: 12px; background: var(--lav-border); }

        /* The scrollable columns wrapper */
        .sp-table-scroll-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        .sp-table-scroll-container::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(to right, transparent, var(--lav-card));
            pointer-events: none;
            z-index: 5;
        }
        .sp-week-scroll {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
        }
        .sp-week-scroll::-webkit-scrollbar {
            height: 6px; width: 6px;
        }
        .sp-week-scroll::-webkit-scrollbar-thumb {
            background: var(--lav-border);
            border-radius: 3px;
        }

        .sp-week-inner {
            display: flex;
            min-width: max-content;
            height: 100%;
        }

        /* Each day column */
        .wt-col {
            width: 170px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--lav-border);
        }
        .wt-col:last-child { border-right: none; }
        .wt-col.today { background: #F8F7FF; }
        .wt-col.past { opacity: 0.85; }

        .wt-col-head {
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--lav-border);
            flex-shrink: 0;
            text-align: center;
        }
        .wt-day-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--lav-gray);
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
        .wt-day-num {
            font-size: 24px;
            font-weight: 800;
            color: var(--lav-dark);
            line-height: 1;
            margin-bottom: 6px;
        }
        .wt-col.today .wt-day-name,
        .wt-col.today .wt-day-num { color: var(--lav-accent); }
        
        .wt-day-status {
            font-size: 11px;
            font-weight: 700;
        }
        .wt-status-done { color: #059669; }
        .wt-status-prog { color: var(--lav-accent); }
        .wt-status-up { color: var(--lav-gray); }

        /* Tasks inside day column */
        .wt-col-tasks {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .wt-task-cell {
            padding: 12px 14px;
            border-bottom: 1px solid var(--lav-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .wt-task-cell.math { background: #F3F8FF; border-left: 3px solid #3B82F6; }
        .wt-task-cell.reading { background: #F0FDF4; border-left: 3px solid #10B981; }
        .wt-task-cell.vocab { background: #FFFBEB; border-left: 3px solid #F59E0B; }
        .wt-task-cell.exam { background: #FFF7ED; border-left: 3px solid #EA580C; }
        
        .wt-task-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }
        .wt-task-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--lav-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            display: block;
        }
        .wt-col.past .wt-task-name { color: var(--lav-gray); }
        .wt-task-time {
            font-size: 10px;
            font-weight: 600;
            color: var(--lav-gray);
        }
        
        .wt-task-icon {
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .wt-task-icon.done { color: #059669; }
