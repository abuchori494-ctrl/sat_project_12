<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Platform – Question Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg: #F5F6FA;
      --surface: #FFFFFF;
      --shadow: 0 4px 24px rgba(75, 68, 136, 0.08);
      --shadow-hover: 0 8px 32px rgba(75, 68, 136, 0.12);
      --border: #E8EAF2;
      --heading: #1E1B4B;
      --body: #374151;
      --muted: #6B7280;
      --primary: #7C69EF;
      --primary-hover: #6B57E8;
      --soft: #F5F3FF;
      --soft-alt: #EDE9FE;

      --craft: #8B5CF6;
      --expr: #3B82F6;
      --info: #EC4899;
      --sec: #F59E0B;
      --math: #0EA5E9;
      --math-adv: #10B981;
      
      /* Sidebar */
      --lav-sidebar: #4B4488;
      --lav-sidebar-active: #5B5091;
      --lav-accent2: #B8B0F5;
    }
    
    body {
      background: var(--bg);
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      color: var(--body);
      margin: 0;
      overflow-x: hidden;
      line-height: 1.5;
    }
    h1, h2, h3, h4, h5, h6 { line-height: 1.2; text-transform: none; }
    
    /* Sidebar matching existing */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
      background: var(--lav-sidebar); z-index: 200; overflow-y: auto;
      box-shadow: 4px 0 24px rgba(61, 56, 117, 0.18);
    }
    #sidebar .logo { display: flex; align-items: center; gap: 10px; padding: 24px 20px 20px; cursor: pointer; user-select: none; }
    #sidebar .logo-icon { font-size: 36px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 4px; }
    #sidebar .logo-text { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.03em; font-family: "Inter", sans-serif; }
    #sidebar .exam-selector { margin: 0 16px 20px; width: calc(100% - 32px); background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 600; outline: none; }
    #sidebar .nav-links { list-style: none; padding: 0 10px; flex: 1; margin: 0; }
    #sidebar .nav-links li.section-label { font-size: 10.5px; font-weight: 800; color: rgba(255, 255, 255, 0.35); letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 12px 6px 14px; }
    #sidebar .nav-links a { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-radius: 10px; color: rgba(255, 255, 255, 0.82); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s ease; }
    #sidebar .nav-links a:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
    #sidebar .nav-links a.active { background: var(--lav-sidebar-active); color: #fff; box-shadow: inset 3px 0 0 var(--lav-accent2); }
    .badge-new { font-size: 10px; font-weight: 600; background: #EDE9FE; color: #7C6FE0; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; margin-left: auto; }
    
    .views-wrap { margin-left: 240px; min-height: 100vh; padding: 32px 32px 80px; }
    
    /* Animations */
    .view { display: none; opacity: 0; animation: fadeUp 0.3s ease-out forwards; }
    .view.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stagger-item { opacity: 0; transform: translateY(10px); transition: all 0.4s ease-out; }
    .stagger-item.show { opacity: 1; transform: translateY(0); }

    .highlight { background: #FEF08A; color: #000; border-radius: 2px; padding: 0 2px; }

    /* Button interaction */
    button, a.btn { transition: all 0.2s ease-out; }
    button:active, a.btn:active { transform: scale(0.97); }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* Cards */
    .premium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: all 0.2s ease-out;
    }
    .premium-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.2s ease-out;
    }
    .cat-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }
    .cat-card.zero-state {
      border: 1px dashed var(--border);
    }
    .cat-card.completed-state {
      border-color: #10B98140;
    }
    
    .cat-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      user-select: none;
      width: 100%;
      text-align: left;
      position: relative;
      background: var(--surface);
      border: none;
      outline: none;
    }
    .cat-header:hover {
      background: #FAFAFA;
    }
    
    .cat-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .cat-card.open .cat-body {
      max-height: 400px;
    }
    .cat-body-inner {
      overflow: hidden;
    }
    
    /* Chevron Toggle */
    .chevron-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease-out;
      background: var(--soft-alt);
      color: var(--primary);
    }
    .cat-card.open .chevron-wrapper {
      background: var(--primary);
      color: #fff;
    }
    .chevron-icon { transition: transform 0.25s ease-out; }
    .cat-card.open .chevron-icon { transform: rotate(180deg); }

    /* Filter Pills */
    .filter-btn { border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease-out;
      white-space: nowrap;
    }
    .filter-btn:hover { background: var(--soft); }
    .filter-btn.active { background: #CECBF6; color: #26215C; border: 0.5px solid #7F77DD; font-weight: 500; box-shadow: none; }
    .filter-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 9999px;
      background: var(--soft-alt);
      color: var(--primary);
    }
    .filter-btn.active .filter-badge {
      background: rgba(255,255,255,0.4);
      color: #26215C;
    }
    
    /* Sub-topic row */
    .sub-row {
      align-items: center;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px 10px 16px;
      border-left: 2px solid var(--color-border-tertiary);
      border-radius: 10px;
      transition: all 0.2s ease-out;
      cursor: pointer;
      text-align: left;
      width: 100%;
      border: none;
      background: transparent;
    }
    .sub-row:hover {
      background: var(--soft);
    }
    .sub-row.completed-row {
      background: #10B98108;
    }
    .sub-row.completed-row:hover {
      background: #10B98115;
    }
    .sub-row.glow-state {
      box-shadow: 0 0 0 2px #7C69EF30;
    }
    
    .progress-track {
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
      height: 6px;
    }
    .sub-row .progress-track {
      height: 5px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      width: 0%; /* animates on load */
      transition: width 500ms ease-out;
    }
    
    /* CTAs */
    .btn-solid-purple {
      background: var(--primary);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-solid-purple:hover {
      background: var(--primary-hover);
    }
    .btn-outline-gray {
      background: transparent;
      color: var(--body);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-outline-gray:hover {
      background: #FAFAFA;
      border-color: #D1D5DB;
    }
    
    /* Badge Status */
    .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 6px; }
    .status-not-started { background: transparent; border: none; color: var(--muted); font-weight: 400; padding: 0; font-size: 12px; }
    .status-in-progress { background: #EEEDFE; color: #3C3489; font-size: 11px; padding: 3px 10px; border-radius: 99px; }
    .status-in-progress::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
    .status-completed { background: #E1F5EE; color: #085041; font-size: 11px; padding: 3px 10px; border-radius: 99px; }

    /* Utilities */
    .btn-primary {
      background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 14px rgba(124, 105, 239, 0.25); display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none;
    }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(124, 105, 239, 0.35); }
    
    .stat-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 2px 8px rgba(75, 68, 136, 0.05);
      padding: 12px 16px; display: flex; align-items: center; gap: 16px; flex: 1; min-width: 160px;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .stat-box:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

    .search-input {
      width: 100%; border: none; outline: none; font-size: 15px; color: var(--heading); background: transparent;
    }
    .search-input::placeholder { color: #9CA3AF; }

    .list-container {
      transition: opacity 150ms ease-out;
    }
    .list-container.fading {
      opacity: 0;
    }
    
    .checkmark-anim {
      animation: scaleIn 200ms ease-out forwards;
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  
    .stat-box { transition: border-color 0.15s ease-out; border: 1px solid transparent; }
    .stat-box:hover { border-color: var(--primary-hover); }
    button:focus-visible, a:focus-visible, input:focus-visible, .filter-btn:focus-visible { outline: 2px solid #7F77DD; outline-offset: 2px; }
    .premium-card, .cat-card { box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06); }
    .sub-action { min-width: 80px; text-align: center; justify-content: center; display: inline-flex; }
    @media (max-width: 600px) {
      #sidebar { display: none; }
      body.sidebar-collapsed #sidebar { display: block; z-index: 999; }
      .views-wrap { margin-left: 0; padding: 16px; }
      
    }
    

  
    .practice-all-link { font-size: 13px; color: #534AB7; border-bottom: 1px solid transparent; padding: 0 0 2px 0; background: none; border-radius: 0; border: none; font-weight: 600; cursor: pointer; }
    .practice-all-link:hover { border-bottom: 1px solid #534AB7; background: none; transform: none; border-color: #534AB7; }

  
    .time-pill { background: var(--surface); border: 0.5px solid var(--border); border-radius: 99px; padding: 2px 8px; font-size: 11px; color: var(--muted); }

  
    .sub-row.completed-row { background: #E1F5EE; }
    .sub-row.completed-row .sub-name { color: var(--muted); }

  
    .banner-btn { background: #7F77DD; color: #EEEDFE; border: none; padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; position: relative; z-index: 10; }
    .banner-btn:hover { background: #6B57E8; }

  .cat-card:hover { border-color: var(--border); transition: border-color 0.15s; }
  
    .cat-body { display: none; }
    .cat-card.open .cat-body { display: block; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <!-- SIDEBAR -->
  <nav id="sidebar"></nav>

  <div class="views-wrap">
    <div class="max-w-[1400px] mx-auto">
      
      <!-- DASHBOARD VIEW -->
      <main id="view-dashboard" class="view active">
        <div class="mb-6">
          <h1 class="text-[28px] font-bold text-[#1E1B4B] mb-1">Question Bank</h1>
          <p class="text-[14px] text-[#6B7280] max-w-[600px]">Practice every tested skill with thousands of official-style SAT questions.</p>
        </div>

        <!-- Tip Banner -->
        <!-- Tip Banner -->
        <div id="overview-tip" class="mb-6 relative flex items-start gap-3 p-4" style="border: 0.5px solid #E8EAF2; border-radius: 8px; background: #F5F6FA;">
          <i class="ti ti-info-circle" style="font-size: 16px; color: #6B7280; margin-top: 2px;"></i>
          <div class="flex-1">
            <p class="text-[14px] font-medium text-[#1E1B4B] leading-snug">
              <span class="font-bold">Tip:</span> Focus on one skill at a time. Students who practice daily score 120+ points higher on average.
            </p>
          </div>
          <button onclick="dismissTip('overview-tip')" class="text-[#9CA3AF] hover:text-[#4B5563] p-1 -mt-1 -mr-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[1fr_1px_1fr] gap-8 lg:gap-0">
          <!-- LEFT COLUMN: READING & WRITING -->
          <div class="flex flex-col min-w-0 lg:pr-[20px]">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <i class="ti ti-book" style="font-size: 18px; color: #534AB7;"></i>
                  <h2 class="text-[20px] font-bold text-[#1E1B4B]">Reading & Writing</h2>
                </div>
                <div id="rw-stats-summary" class="text-[13px] text-[#6B7280] font-medium">1492 questions · 10 skills</div>
              </div>
              <button id="rw-global-btn" onclick="window.location.href='/exam.html?mode=practice&type=mixed&subject=reading'" class="shadow-sm hover:shadow-md transition-all hover:scale-[0.98] self-start sm:self-auto" style="background: #7F77DD; color: #EEEDFE; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; border: none; cursor: pointer;">
                Practice all <i class="ti ti-arrow-right" style="font-size: 13px;"></i>
              </button>
            </div>
            
            <div style="margin-top: 12px; margin-bottom: 12px;">
              <div class="flex flex-wrap rw-filters" style="gap: 6px;">
                <!-- Filters populated by JS -->
              </div>
            </div>

            <div class="list-container" id="rw-lists"></div>
          </div>

          <!-- DIVIDER -->
          <div style="width:1px; background: var(--color-border-tertiary); align-self: stretch"></div>

          <!-- RIGHT COLUMN: MATH -->
          <div class="flex flex-col min-w-0 lg:pl-[20px]">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <i class="ti ti-math" style="font-size: 18px; color: #0F6E56;"></i>
                  <h2 class="text-[20px] font-bold text-[#1E1B4B]">Math</h2>
                </div>
                <div id="math-stats-summary" class="text-[13px] text-[#6B7280] font-medium">2390 questions · 28 skills</div>
              </div>
              <button id="math-global-btn" onclick="window.location.href='/exam.html?mode=practice&type=mixed&subject=math'" class="shadow-sm hover:shadow-md transition-all hover:scale-[0.98] self-start sm:self-auto" style="background: #1D9E75; color: #E1F5EE; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; border: none; cursor: pointer;">
                Start first session <i class="ti ti-arrow-right" style="font-size: 13px;"></i>
              </button>
            </div>
            
            <div style="margin-top: 12px; margin-bottom: 12px;">
              <div class="flex flex-wrap math-filters" style="gap: 6px;">
                <!-- Filters populated by JS -->
              </div>
            </div>

            <div class="list-container" id="math-lists"></div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    // DATA
    const RW_CATEGORIES = [
      {
        id: "craft-and-structure", label: "Craft and Structure", desc: "Analyze how authors build arguments", icon: "✦", accentHex: "#8B5CF6",
        subTopics: [
          { id: "cross-text", label: "Cross-Text Connections", completed: 10, total: 57 },
          { id: "text-structure", label: "Text Structure and Purpose", completed: 115, total: 115 },
          { id: "words-in-context", label: "Words in Context", completed: 0, total: 219 },
        ]
      },
      {
        id: "expression-of-ideas", label: "Expression of Ideas", desc: "Improve clarity and flow of writing", icon: "✎", accentHex: "#3B82F6",
        subTopics: [
          { id: "rhetorical-synthesis", label: "Rhetorical Synthesis", completed: 0, total: 171 },
          { id: "transitions", label: "Transitions", completed: 0, total: 139 },
        ]
      },
      {
        id: "information-and-ideas", label: "Information and Ideas", desc: "Interpret and analyze informational texts", icon: "◈", accentHex: "#EC4899",
        subTopics: [
          { id: "central-ideas", label: "Central Ideas", completed: 0, total: 142 },
          { id: "command-of-evidence", label: "Evidence", completed: 0, total: 128 },
          { id: "inferences", label: "Inferences", completed: 0, total: 91 },
        ]
      },
      {
        id: "standard-english-conventions", label: "Standard English Conventions", desc: "Master grammar, punctuation, and sentence structure", icon: "¶", accentHex: "#F59E0B",
        subTopics: [
          { id: "boundaries", label: "Boundaries", completed: 0, total: 103 },
          { id: "form-structure", label: "Form & Structure", completed: 0, total: 117 },
        ]
      }
    ];

    const MATH_CATEGORIES = [
      {
        id: "algebra", label: "Algebra", desc: "Master linear equations and inequalities", icon: "∑", accentHex: "#0EA5E9",
        subTopics: [
          { id: "lin1", label: "Linear equations in one variable", completed: 0, total: 159 },
          { id: "linf", label: "Linear functions", completed: 0, total: 225 },
          { id: "lin2", label: "Linear equations in two variables", completed: 0, total: 179 },
          { id: "sys", label: "Systems of linear eq", completed: 0, total: 161 },
          { id: "ineq", label: "Linear inequalities", completed: 0, total: 100 },
        ]
      },
      {
        id: "advanced-math", label: "Advanced Math", desc: "Navigate complex nonlinear equations and functions", icon: "ƒ", accentHex: "#10B981",
        subTopics: [
          { id: "equiv", label: "Expressions", completed: 0, total: 158 },
          { id: "nonlin1", label: "Nonlinear equations", completed: 0, total: 211 },
          { id: "nonlinf", label: "Nonlinear functions", completed: 0, total: 320 },
        ]
      },
      {
        id: "problem-solving", label: "Problem-Solving and Data Analysis", desc: "Interpret data, rates, and probabilities", icon: "📊", accentHex: "#F59E0B",
        subTopics: [
          { id: "ratios", label: "Ratios & proportions", completed: 0, total: 119 },
          { id: "percent", label: "Percentages", completed: 0, total: 101 },
          { id: "dist", label: "Data distributions", completed: 0, total: 103 },
          { id: "scatter", label: "Scatterplots & models", completed: 0, total: 74 },
          { id: "prob", label: "Probability", completed: 0, total: 56 },
          { id: "infer", label: "Sample statistics", completed: 0, total: 33 },
          { id: "eval", label: "Evaluating statistical claims", completed: 0, total: 12 },
        ]
      },
      {
        id: "geometry", label: "Geometry and Trigonometry", desc: "Understand shapes, angles, and trigonometric ratios", icon: "△", accentHex: "#EC4899",
        subTopics: [
          { id: "area", label: "Area and volume", completed: 0, total: 113 },
          { id: "lines", label: "Lines & angles", completed: 0, total: 110 },
          { id: "trig", label: "Trigonometry", completed: 0, total: 83 },
          { id: "circles", label: "Circles", completed: 0, total: 73 },
        ]
      }
    ];

    let state = {
      rw: { filter: 'all', search: '' },
      math: { filter: 'all', search: '' }
    };
    
    let searchTimeout = null;

    // CORE FUNCTIONS
    function navigate(viewId) {
      document.querySelectorAll('.view').forEach(v => {
        v.classList.remove('active');
        v.classList.add('hidden');
      });
      const target = document.getElementById('view-' + viewId);
      if (target) {
        target.classList.remove('hidden');
        target.classList.add('active');
        runCountUp();
        
        // Stagger list on enter
        const type = viewId === 'rw-skills' ? 'rw' : (viewId === 'math-skills' ? 'math' : null);
        if (type) {
          const container = document.getElementById(`${type}-lists`);
          container.classList.add('fading');
          setTimeout(() => {
            container.classList.remove('fading');
            const items = container.querySelectorAll('.stagger-item');
            items.forEach((item, i) => setTimeout(() => item.classList.add('show'), i * 60));
          }, 50);
        }
      }
      window.scrollTo(0, 0);
    }

    function dismissTip(id) {
      const el = document.getElementById(id);
      if(el) {
        el.style.display = 'none';
        localStorage.setItem(`qb-${id}-dismissed`, 'true');
      }
    }

    function checkTips() {
      ['overview-tip', 'rw-tip', 'math-tip'].forEach(id => {
        if(localStorage.getItem(`qb-${id}-dismissed`) === 'true') {
          const el = document.getElementById(id);
          if(el) el.style.display = 'none';
        }
      });
    }

    function runCountUp() {
      document.querySelectorAll('.view.active [data-count]').forEach(el => {
        const target = parseInt(el.getAttribute('data-count'));
        if (target === 0) { el.innerText = '0'; return; }
        
        let count = 0;
        const duration = 400; // ms
        const increment = target / (duration / 16); // 60fps
        
        const update = () => {
          count += increment;
          if (count < target) {
            el.innerText = Math.ceil(count);
            requestAnimationFrame(update);
          } else {
            el.innerText = target;
          }
        };
        update();
      });
    }

    // LIST RENDERER
    function matchesFilter(completed, total, filter) {
      if (filter === "all") return true;
      if (filter === "not-started") return completed === 0;
      if (filter === "in-progress") return completed > 0 && completed < total;
      if (filter === "completed") return completed === total && total > 0;
      return true;
    }
    
    function triggerConfetti() {
      if (typeof confetti !== 'undefined') {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });
      }
    }

    function renderList(type) {
      const isMath = type === 'math';
      const containerId = isMath ? 'math-lists' : 'rw-lists';
      const container = document.getElementById(containerId);
      const categories = isMath ? MATH_CATEGORIES : RW_CATEGORIES;
      const { filter, search } = state[type];
      
      container.classList.add('fading');
      
      setTimeout(() => {
        container.innerHTML = '';
        const searchLower = search.toLowerCase().trim();
        const clearBtn = document.getElementById(`${type}-search-clear`);
        if(clearBtn) clearBtn.style.display = search.length > 0 ? "block" : "none";
        let hasVisible = false;

        categories.forEach((cat, index) => {
          let visibleSubs = cat.subTopics.filter(s => {
            const mFilter = matchesFilter(s.completed, s.total, filter);
            const mSearch = searchLower === '' || s.label.toLowerCase().includes(searchLower);
            return mFilter && mSearch;
          });

          
          if (visibleSubs.length === 0) return;
          hasVisible = true;


          const catCompleted = cat.subTopics.reduce((s, t) => s + t.completed, 0);
          const catTotal = cat.subTopics.reduce((s, t) => s + t.total, 0);
          const catPct = catTotal > 0 ? Math.round((catCompleted / catTotal) * 100) : 0;
          
          let badgeHtml = '';
          if (catPct === 0) {
            badgeHtml = `<span class="status-badge status-not-started">NOT STARTED</span>`;
          } else if (catPct === 100) {
            badgeHtml = `<span class="status-badge status-completed"><span class="checkmark-anim inline-block mr-1">✓</span> COMPLETED</span>`;
          } else {
            badgeHtml = `<span class="status-badge status-in-progress">IN PROGRESS</span>`;
          }
          const isZeroState = catPct === 0;
          const isCompleteState = catPct === 100;

          const catEl = document.createElement('div');
          const isOpen = (!isZeroState && !isCompleteState);
          catEl.className = `cat-card stagger-item ${isZeroState ? 'zero-state' : ''} ${isCompleteState ? 'completed-state' : ''} ${isOpen ? 'open' : ''}`; 
          
          const positionColors = [
            { border: '#7F77DD', bg: '#EEEDFE', icon: '#534AB7', prog: '#7F77DD', btnBg: '#7F77DD', btnText: '#EEEDFE' },
            { border: '#1D9E75', bg: '#E1F5EE', icon: '#0F6E56', prog: '#1D9E75', btnBg: '#1D9E75', btnText: '#E1F5EE' },
            { border: '#D4537E', bg: '#FBEAF0', icon: '#993556', prog: '#D4537E', btnBg: '#D4537E', btnText: '#FBEAF0' },
            { border: '#378ADD', bg: '#E6F1FB', icon: '#185FA5', prog: '#378ADD', btnBg: '#378ADD', btnText: '#E6F1FB' }
          ];
          const colorSet = positionColors[index % positionColors.length];

          // ZONE A: Header
          const headerHtml = `
            <button type="button" class="cat-header" onclick="toggleCat(this)" aria-expanded="true">
              <div class="absolute left-0 top-0 bottom-0 w-1" style="background: ${colorSet.border};"></div>
              
              <div class="w-[36px] h-[36px] rounded-[8px] flex items-center justify-center text-[16px] shrink-0 flex-shrink-0" style="background: ${colorSet.bg}; color: ${colorSet.icon}; font-family: system-ui;">
                ${cat.icon}
              </div>
              
              <div class="flex-1 min-w-0 pr-2">
                <div class="flex flex-col mb-1">
                  <h3 class="text-[16px] font-semibold text-[#1E1B4B] leading-tight truncate">${cat.label}</h3>
                </div>
                
                <div class="flex items-center gap-2">
                  <p class="text-[12px] text-[#9CA3AF] font-medium whitespace-nowrap">${cat.subTopics.length} skills · ${catCompleted} of ${catTotal} completed</p>
                  <div class="h-2 flex-1 max-w-[120px] bg-[#E8EAF2] rounded-full overflow-hidden ml-2">
                    <div class="h-full rounded-full transition-all duration-500" style="width: ${catPct}%; background: ${colorSet.prog}"></div>
                  </div>
                  <span class="text-[11px] font-bold" style="color: ${colorSet.prog}">${catPct}%</span>
                </div>
              </div>
              
              <div class="flex items-center gap-4 shrink-0">
                ${badgeHtml}
                <div class="chevron-wrapper" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="chevron-icon"><path d="M6 9l6 6 6-6"/></svg>
                </div>
              </div>
            </button>
          `;

          // ZONE B: Rows
          let bodyHtml = `<div class="cat-body"><div class="cat-body-inner flex flex-col gap-1 px-2 pb-2">`;
          
          

          visibleSubs.forEach((sub, i) => {
            const subPct = sub.total > 0 ? Math.round((sub.completed / sub.total) * 100) : 0;
            const estMin = Math.round(sub.total * 1.5);
            const isZero = subPct === 0;
            const isRowComplete = subPct === 100;
            const isFirstRow = i === 0 && isZeroState;
            
            // Highlight search text
            let labelHtml = sub.label;
            if (searchLower) {
              const regex = new RegExp(`(${searchLower})`, 'gi');
              labelHtml = sub.label.replace(regex, '<span class="highlight">$1</span>');
            }
            
            let ctaHtml = '';
            if (isZero) {
              ctaHtml = `<button class="sub-action" style="background: ${colorSet.btnBg}; color: ${colorSet.btnText}; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; border: none;">Start →</button>`;
            } else if (isRowComplete) {
              ctaHtml = `<button class="sub-action" style="background: ${colorSet.btnBg}; color: ${colorSet.btnText}; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; border: none;">Review →</button>`;
            } else {
              ctaHtml = `<button class="sub-action" style="background: ${colorSet.btnBg}; color: ${colorSet.btnText}; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; border: none;">Continue →</button>`;
            }
            
            let progressHtml = '';
            if (isRowComplete) {
              progressHtml = `<span class="text-[13px] font-bold text-[#6B7280] flex items-center gap-1">${sub.completed}/${sub.total} <span class="text-[#10B981] checkmark-anim">✓</span></span>`;
            } else {
              progressHtml = `<span class="text-[12px] font-bold text-[${isZero ? '#9CA3AF' : '#6B7280'}] tabular-nums whitespace-nowrap">${sub.completed}/${sub.total}</span>`;
            }

            bodyHtml += `
              <div onclick="window.location.href='/exam.html?mode=practice&category=${cat.id}&topic=${sub.id}'" class="sub-row group ${isRowComplete ? 'completed-row' : ''} ${isFirstRow ? 'glow-state' : ''}">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                  <div class="w-[3px] h-[28px] rounded-full shrink-0" style="background: ${isZero ? '#E8EAF2' : colorSet.border}"></div>
                  <div class="text-left flex-1 min-w-0 pr-4">
                    <p class="text-[14px] font-medium text-[#374151] leading-snug group-hover:text-[${colorSet.border}] transition-colors" style="flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${labelHtml}</p>
                    
                  </div>
                </div>
                
                <div class="flex items-center gap-4 shrink-0">
                  ${ctaHtml}
                  <div class="flex items-center gap-3 w-[140px]">
                    <div class="progress-track flex-1" style="background: ${isZero ? '#EDE9FE' : '#E8EAF2'}">
                      <div class="progress-fill" style="width: ${subPct}%; background: ${colorSet.prog}"></div>
                    </div>
                    ${progressHtml}
                  </div>
                </div>
              </div>
            `;
          });
          
          // ZONE C: Footer
          bodyHtml += `<div class="border-t border-[#E8EAF2] mt-1 px-5 py-3 flex items-center justify-between">`;
          if (isCompleteState) {
            bodyHtml += `<span class="text-[13px] text-[#10B981] font-bold">Category mastered! 🎉</span>`;
          } else {
            bodyHtml += `<span class="text-[12px] text-[#6B7280] font-medium">${visibleSubs.length} of ${cat.subTopics.length} skills in this category</span>`;
          }
          bodyHtml += `<div class="flex items-center gap-4 shrink-0"><a href="/exam.html?mode=practice&category=${cat.id}" style="font-size: 13px; color: #534AB7; font-weight: 500; background: transparent; border: none; cursor: pointer; text-decoration: none;">Practice All →</a></div></div></div></div>`;

          catEl.innerHTML = headerHtml + bodyHtml;
          container.appendChild(catEl);
        });
        if (!hasVisible) {
          container.innerHTML = '<div class="text-center" style="padding: 32px 0;"><i class="ti ti-circle-dashed" style="font-size: 24px; color: #9CA3AF; margin-bottom: 12px; display: inline-block;"></i><p style="font-size: 13px; color: #6B7280;">No skills match</p></div>';
        }

        // Trigger stagger animation
        requestAnimationFrame(() => {
          container.classList.remove('fading');
          const items = container.querySelectorAll('.stagger-item');
          items.forEach((item, i) => {
            setTimeout(() => item.classList.add('show'), i * 60);
          });
        });
      }, 150);
    }

    function toggleCat(btn) {
      const parent = btn.parentElement;
      const isExpanded = parent.classList.contains('open');
      btn.setAttribute('aria-expanded', !isExpanded);
      parent.classList.toggle('open');
    }

    // SEARCH LOGIC
    
    function clearSearch(type) {
      document.getElementById(type + '-search').value = '';
      document.getElementById(type + '-search-clear').style.display = 'none';
      debounceSearch(type);
    }
  
    function debounceSearch(type) {
      clearTimeout(searchTimeout);
      const input = document.getElementById(`${type}-search`);
      searchTimeout = setTimeout(() => {
        state[type].search = input.value;
        renderList(type);
      }, 150);
    }
    
    // RENDER PAGE LEVEL LOGIC
    function renderPageLayout() {
      const rwTotal = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.total, 0), 0);
      const rwCompleted = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.completed, 0), 0);
      const rwPct = rwTotal > 0 ? Math.round((rwCompleted / rwTotal) * 100) : 0;
      const rwSkillsCount = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.length, 0);

      const mathTotal = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.total, 0), 0);
      const mathCompleted = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.completed, 0), 0);
      const mathPct = mathTotal > 0 ? Math.round((mathCompleted / mathTotal) * 100) : 0;
      const mathSkillsCount = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.length, 0);

      document.getElementById('rw-stats-summary').innerText = `${rwTotal} questions · ${rwSkillsCount} skills · ${rwPct}% completed`;
      document.getElementById('math-stats-summary').innerText = `${mathTotal} questions · ${mathSkillsCount} skills · ${mathPct}% completed`;
      
      renderFilters('rw');
      renderFilters('math');
    }

    function renderFilters(type) {
      const isMath = type === 'math';
      const categories = isMath ? MATH_CATEGORIES : RW_CATEGORIES;
      const color = isMath ? '#0EA5E9' : '#7C69EF';
      const bg = isMath ? '#E0F2FE' : 'rgba(255,255,255,0.2)';
      
      let all = 0, notStarted = 0, inProg = 0, comp = 0;
      categories.forEach(cat => {
        cat.subTopics.forEach(sub => {
          all++;
          if (sub.completed === 0) notStarted++;
          else if (sub.completed === sub.total) comp++;
          else inProg++;
        });
      });

      const container = document.querySelector(`.${type}-filters`);
      const { filter, search } = state[type];
      
      // Ensure row styling for container
      container.style.flexWrap = 'nowrap';
      container.style.alignItems = 'center';
      container.style.justifyContent = 'space-between';
      container.style.gap = '8px';

      const makePill = (id, label, count) => {
        const isActive = filter === id;
        let pillStyle = '';
        if (isActive) {
          if (isMath) {
            pillStyle = 'background: #9FE1CB !important; border-color: #1D9E75 !important; color: #04342C !important; font-weight: 500;';
          } else {
            pillStyle = 'background: #CECBF6 !important; border-color: #7F77DD !important; color: #26215C !important; font-weight: 500;';
          }
        } else {
          pillStyle = 'background: #FFFFFF; border-color: #E8EAF2; color: #6B7280; font-weight: 400;';
        }
        return `
          <button class="filter-btn shrink-0" data-filter="${id}" style="${pillStyle} padding: 4px 10px; border-radius: 99px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; border-width: 0.5px; border-style: solid; margin: 0; outline: none;">
            ${label} <span style="font-weight: 600; color: inherit;">${count}</span>
          </button>
        `;
      };

      container.innerHTML = `
        <div class="flex items-center shrink-0 no-scrollbar" style="gap: 5px; overflow-x: auto; padding-bottom: 2px;">
          ${makePill('all', 'All', all)}
          ${makePill('not-started', 'Not Started', notStarted)}
          ${makePill('in-progress', '<i class="ti ti-clock" style="font-size: 11px;"></i> In Progress', inProg)}
          ${makePill('completed', '<i class="ti ti-check" style="font-size: 11px;"></i> Completed', comp)}
        </div>
        <div class="flex-1 relative min-w-[100px]">
          <i class="ti ti-search absolute left-[10px] top-1/2 -translate-y-1/2 text-[#9CA3AF]" style="font-size: 14px; pointer-events: none;"></i>
          <input type="text" id="${type}-search" value="${search || ''}" placeholder="Search skills…" class="w-full bg-white border border-[#E8EAF2] rounded-full text-[12px] text-[#374151] placeholder-[#9CA3AF] focus:outline-none transition-colors" style="padding: 5px 28px 5px 30px; border-color: #E8EAF2;" onfocus="this.style.borderColor='${color}'" onblur="this.style.borderColor='#E8EAF2'">
          <button id="${type}-search-clear" onclick="clearSearch('${type}')" class="absolute right-[8px] top-1/2 -translate-y-1/2 text-[#9CA3AF] hover:text-[#374151] transition-colors" style="display: ${search ? 'block' : 'none'}; border: none; background: transparent; cursor: pointer; padding: 2px;">
            <i class="ti ti-x" style="font-size: 14px;"></i>
          </button>
        </div>
      `;

      container.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          state[type].filter = e.currentTarget.getAttribute('data-filter');
          renderFilters(type);
          renderList(type);
        });
      });
      
      const searchInput = document.getElementById(`${type}-search`);
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          state[type].search = e.target.value;
          document.getElementById(`${type}-search-clear`).style.display = e.target.value.length > 0 ? 'block' : 'none';
          debounceSearch(type);
        });
      }
    }

    function toggleCat(btn) {
      const parent = btn.parentElement;
      const isExpanded = parent.classList.contains('open');
      btn.setAttribute('aria-expanded', !isExpanded);
      parent.classList.toggle('open');
    }

    // SEARCH LOGIC
    
    function clearSearch(type) {
      document.getElementById(type + '-search').value = '';
      document.getElementById(type + '-search-clear').style.display = 'none';
      debounceSearch(type);
    }
  
    function debounceSearch(type) {
      clearTimeout(searchTimeout);
      const input = document.getElementById(`${type}-search`);
      searchTimeout = setTimeout(() => {
        state[type].search = input.value;
        renderList(type);
      }, 150);
    }
    
    // RENDER PAGE LEVEL LOGIC
    function renderPageLayout() {
      const rwTotal = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.total, 0), 0);
      const rwCompleted = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.completed, 0), 0);
      const rwPct = rwTotal > 0 ? Math.round((rwCompleted / rwTotal) * 100) : 0;
      const rwSkillsCount = RW_CATEGORIES.reduce((s, cat) => s + cat.subTopics.length, 0);

      const mathTotal = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.total, 0), 0);
      const mathCompleted = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.reduce((a, b) => a + b.completed, 0), 0);
      const mathPct = mathTotal > 0 ? Math.round((mathCompleted / mathTotal) * 100) : 0;
      const mathSkillsCount = MATH_CATEGORIES.reduce((s, cat) => s + cat.subTopics.length, 0);

      document.getElementById('rw-stats-summary').innerText = `${rwTotal} questions · ${rwSkillsCount} skills · ${rwPct}% completed`;
      document.getElementById('math-stats-summary').innerText = `${mathTotal} questions · ${mathSkillsCount} skills · ${mathPct}% completed`;
      
      renderFilters('rw');
      renderFilters('math');
    }

    function renderFilters(type) {
      const isMath = type === 'math';
      const categories = isMath ? MATH_CATEGORIES : RW_CATEGORIES;
      const color = isMath ? '#0EA5E9' : 'var(--primary)';
      const bg = isMath ? '#E0F2FE' : 'rgba(255,255,255,0.2)';
      
      let all = 0, notStarted = 0, inProg = 0, comp = 0;
      categories.forEach(cat => {
        cat.subTopics.forEach(sub => {
          all++;
          if (sub.completed === 0) notStarted++;
          else if (sub.completed === sub.total) comp++;
          else inProg++;
        });
      });

      const container = document.querySelector(`.${type}-filters`);
      const { filter } = state[type];

      const makePill = (id, label, count) => {
        const isActive = filter === id;
        let pillStyle = '';
        if (isActive) {
          if (isMath) {
            pillStyle = 'background: #9FE1CB !important; border-color: #1D9E75 !important; color: #04342C !important; font-weight: 500;';
          } else {
            pillStyle = 'background: #CECBF6 !important; border-color: #7F77DD !important; color: #26215C !important; font-weight: 500;';
          }
        } else {
          pillStyle = 'background: #FFFFFF; border-color: #E8EAF2; color: #6B7280; font-weight: 400;';
        }
        return `
          <button class="filter-btn" data-filter="${id}" style="${pillStyle} padding: 5px 11px; border-radius: 99px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; border-width: 0.5px; border-style: solid; margin: 0;">
            ${label} <span style="font-weight: 500; color: inherit;">${count}</span>
          </button>
        `;
      };

      container.innerHTML = `
        ${makePill('all', 'All', all)}
        ${makePill('not-started', 'Not Started', notStarted)}
        ${makePill('in-progress', '<i class="ti ti-clock" style="font-size: 12px;"></i> In Progress', inProg)}
        ${makePill('completed', '<i class="ti ti-check" style="font-size: 12px;"></i> Completed', comp)}
      `;

      container.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          state[type].filter = e.currentTarget.getAttribute('data-filter');
          renderFilters(type);
          renderList(type);
        });
      });
    }

    // INITIALIZATION
    document.addEventListener('DOMContentLoaded', () => {
      checkTips();
      renderPageLayout();
      renderList('rw');
      renderList('math');
      runCountUp();
      
      // Global click handler to attach confetti trigger loosely.
      // (When clicking a row that is close to complete, or testing... here we just mock it)
      window.triggerConfetti = triggerConfetti;
    });

  </script>
